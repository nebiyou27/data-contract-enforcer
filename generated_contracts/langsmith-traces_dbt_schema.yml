  - name: name
    tests:
    - not_null
  - name: run_type
    tests:
    - not_null
  - name: start_time
    tests:
    - not_null
  - name: end_time
    tests:
    - not_null
  - name: inputs_json
    tests:
    - not_null
  - name: outputs_json
  - name: error
  - name: tags_json
    tests:
    - not_null
  - name: app_path
    tests:
    - not_null
  - name: trace_project_id
    tests:
    - not_null
    - unique
