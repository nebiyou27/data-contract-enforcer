quality:
  type: custom
  specification: https://bitol.io/specs/quality/v1
  rules:
  - name: events.event_id.not_null
    description: event_id must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM events WHERE event_id IS NULL
    mustBe: 0
  - name: events.event_type.not_null
    description: event_type must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM events WHERE event_type IS NULL
    mustBe: 0
  - name: events.aggregate_id.not_null
    description: aggregate_id must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM events WHERE aggregate_id IS NULL
    mustBe: 0
  - name: events.aggregate_type.not_null
    description: aggregate_type must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM events WHERE aggregate_type IS NULL
    mustBe: 0
  - name: events.sequence_number.not_null
    description: sequence_number must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM events WHERE sequence_number IS NULL
    mustBe: 0
  - name: events.occurred_at.not_null
    description: occurred_at must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM events WHERE occurred_at IS NULL
    mustBe: 0
  - name: events.recorded_at.not_null
    description: recorded_at must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM events WHERE recorded_at IS NULL
    mustBe: 0
  - name: events.event_id.unique
    description: event_id must be unique -- duplicates indicate replay or ID collision
    dimension: uniqueness
    severity: error
    query: SELECT COUNT(*) - COUNT(DISTINCT event_id) FROM events
    mustBe: 0
  - name: events.event_type.allowed_values
    description: event_type must be one of the 34 known domain event types
    dimension: validity
    severity: warning
    query: SELECT COUNT(*) FROM events WHERE event_type NOT IN ('AgentInputValidated', 'AgentNodeExecuted', 'AgentOutputWritten',
      'AgentSessionCompleted', 'AgentSessionStarted', 'AgentToolCalled', 'ApplicationApproved', 'ApplicationDeclined', 'ApplicationSubmitted',
      'ComplianceCheckCompleted', 'ComplianceCheckInitiated', 'ComplianceCheckRequested', 'ComplianceRuleFailed', 'ComplianceRuleNoted',
      'ComplianceRulePassed', 'CreditAnalysisCompleted', 'CreditAnalysisRequested', 'CreditRecordOpened', 'DecisionGenerated',
      'DecisionRequested', 'DocumentAdded', 'DocumentFormatValidated', 'DocumentUploadRequested', 'DocumentUploaded', 'ExtractedFactsConsumed',
      'ExtractionCompleted', 'ExtractionStarted', 'FraudScreeningCompleted', 'FraudScreeningInitiated', 'FraudScreeningRequested',
      'HistoricalProfileConsumed', 'PackageCreated', 'PackageReadyForAnalysis', 'QualityAssessmentCompleted') AND event_type
      IS NOT NULL
    mustBe: 0
  - name: events.sequence_number.non_negative
    description: sequence_number must be >= 0 (0-indexed per stream)
    dimension: validity
    severity: error
    query: SELECT COUNT(*) FROM events WHERE sequence_number < 0
    mustBe: 0
  - name: events.schema_version.allowed_values
    description: schema_version must be a recognised contract version
    dimension: validity
    severity: warning
    query: SELECT COUNT(*) FROM events WHERE schema_version NOT IN ('1.0', '2.0') AND schema_version IS NOT NULL
    mustBe: 0
  - name: event_metadata.correlation_id.not_null
    description: correlation_id must never be null -- it anchors the causal chain
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM event_metadata WHERE correlation_id IS NULL
    mustBe: 0
  - name: event_metadata.event_id.unique
    description: event_id in event_metadata must be unique (1:1 with events table)
    dimension: uniqueness
    severity: error
    query: SELECT COUNT(*) - COUNT(DISTINCT event_id) FROM event_metadata
    mustBe: 0
  - name: event_metadata.source_service.allowed_values
    description: source_service must be one of the 6 known microservices
    dimension: validity
    severity: warning
    query: SELECT COUNT(*) FROM event_metadata WHERE source_service NOT IN ('loan-origination', 'document-management', 'credit-analysis',
      'compliance-engine', 'fraud-screening', 'agent-runtime') AND source_service IS NOT NULL
    mustBe: 0
  - name: event_metadata.global_position.positive
    description: global_position must be >= 1 (1-indexed global event order)
    dimension: validity
    severity: error
    query: SELECT COUNT(*) FROM event_metadata WHERE global_position < 1
    mustBe: 0
