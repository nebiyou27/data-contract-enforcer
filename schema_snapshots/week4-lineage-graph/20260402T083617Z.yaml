quality:
  type: custom
  specification: https://bitol.io/specs/quality/v1
  rules:
  - name: lineage_nodes.node_id.not_null
    description: node_id must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM lineage_nodes WHERE node_id IS NULL
    mustBe: 0
  - name: lineage_nodes.type.not_null
    description: type must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM lineage_nodes WHERE type IS NULL
    mustBe: 0
  - name: lineage_nodes.label.not_null
    description: label must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM lineage_nodes WHERE label IS NULL
    mustBe: 0
  - name: lineage_nodes.node_id.unique
    description: node_id must be unique across the lineage graph
    dimension: uniqueness
    severity: error
    query: SELECT COUNT(*) - COUNT(DISTINCT node_id) FROM lineage_nodes
    mustBe: 0
  - name: lineage_nodes.type.allowed_values
    description: type must be one of ['FILE', 'MODEL', 'PIPELINE', 'TABLE']
    dimension: validity
    severity: warning
    query: SELECT COUNT(*) FROM lineage_nodes WHERE type NOT IN ('FILE', 'MODEL', 'PIPELINE', 'TABLE') AND type IS NOT NULL
    mustBe: 0
  - name: lineage_nodes.language.allowed_values
    description: language must be one of ['sql', 'yaml', 'unknown']
    dimension: validity
    severity: warning
    query: SELECT COUNT(*) FROM lineage_nodes WHERE language NOT IN ('sql', 'yaml', 'unknown') AND language IS NOT NULL
    mustBe: 0
  - name: lineage_nodes.label.non_empty
    description: label must not be an empty string
    dimension: validity
    severity: warning
    query: SELECT COUNT(*) FROM lineage_nodes WHERE TRIM(label) = ''
    mustBe: 0
  - name: lineage_edges.source.not_null
    description: source must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM lineage_edges WHERE source IS NULL
    mustBe: 0
  - name: lineage_edges.target.not_null
    description: target must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM lineage_edges WHERE target IS NULL
    mustBe: 0
  - name: lineage_edges.relationship.not_null
    description: relationship must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM lineage_edges WHERE relationship IS NULL
    mustBe: 0
  - name: lineage_edges.confidence.not_null
    description: confidence must never be null
    dimension: completeness
    severity: error
    query: SELECT COUNT(*) FROM lineage_edges WHERE confidence IS NULL
    mustBe: 0
  - name: lineage_edges.confidence.range_check
    description: confidence must be between 0.0 and 1.0
    dimension: validity
    severity: error
    query: SELECT COUNT(*) FROM lineage_edges WHERE confidence < 0.0 OR confidence > 1.0
    mustBe: 0
  - name: lineage_edges.confidence.floor_check
    description: confidence < 0.7 signals uncertain lineage; review extraction heuristics
    dimension: validity
    severity: warning
    query: SELECT COUNT(*) FROM lineage_edges WHERE confidence < 0.7
    mustBe: 0
  - name: lineage_edges.relationship.allowed_values
    description: relationship must be one of ['READS', 'WRITES', 'CALLS', 'IMPORTS']
    dimension: validity
    severity: warning
    query: SELECT COUNT(*) FROM lineage_edges WHERE relationship NOT IN ('READS', 'WRITES', 'CALLS', 'IMPORTS') AND relationship
      IS NOT NULL
    mustBe: 0
