registry:
  version: "1.0"
  schema_evolution_policy:
    gate: producer-side
    action_on_breaking_change: block
    registry_update_required: true

# ──────────────────────────────────────────────────────────────────────────────
# CONTRACT CATALOG
# Primary source of truth for which contracts are active and which are
# out-of-scope due to missing source data.
# ──────────────────────────────────────────────────────────────────────────────
contracts:
  - id: week3-document-refinery-extractions
    producer: week3-document-refinery
    status: active
    data_path: outputs/week3/extractions.jsonl

  - id: week4-lineage-graph
    producer: week4-cartographer
    status: active
    data_path: outputs/week4/lineage_snapshots.jsonl

  - id: week5-event-store
    producer: week5-event-capture
    status: active
    data_path: outputs/week5/events.jsonl

  - id: week1-intent-correlator
    producer: week1-intent-correlator
    status: out_of_scope
    reason: Source data not available in this repository.

  - id: week2-digital-courtroom
    producer: week2-digital-courtroom
    status: out_of_scope
    reason: Source data not available in this repository.

  - id: langsmith-traces
    producer: langsmith
    status: out_of_scope
    reason: External system; no local source data available.

# ──────────────────────────────────────────────────────────────────────────────
# SUBSCRIPTIONS
# Declares which downstream systems depend on each contract and which fields
# are breaking — i.e., a change to these fields must be registered here before
# the producer is allowed to ship (enforced by the producer-side evolution gate).
# ──────────────────────────────────────────────────────────────────────────────
subscriptions:
  - source: Week 3
    source_contract: week3-document-refinery-extractions
    target: Week 4
    target_contract: week4-lineage-graph
    breaking_fields:
      - field: documents.fact_count
        reason: Week 4 depends on extraction completeness; a change here hides missing downstream lineage.
      - field: extracted_facts.confidence
        reason: Week 4 lineage quality checks rely on the same confidence semantics used by extraction outputs.
  - source: Week 4
    source_contract: week4-lineage-graph
    target: Week 7
    target_contract: week7-trust-boundary
    breaking_fields:
      - field: lineage_nodes.path
        reason: Week 7 trust-boundary analysis needs stable node paths to trace ownership and deployment boundaries.
      - field: lineage_edges.confidence
        reason: Week 7 uses edge confidence to judge whether lineage can be trusted for impact analysis.
  - source: Week 5
    source_contract: week5-event-store
    target: Week 7
    target_contract: week7-trust-boundary
    breaking_fields:
      - field: events.sequence_number
        reason: Week 7 readers depend on event ordering; changing this breaks replay and audit semantics.
      - field: event_metadata.global_position
        reason: Week 7 blast-radius calculations rely on a stable global ordering for contamination depth.
